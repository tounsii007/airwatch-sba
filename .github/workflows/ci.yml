name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify
        # No mvnw wrapper checked in — use the runner's pre-installed maven
        # (ubuntu-latest ships maven 3.x in the image). Switch to ./mvnw
        # once we commit the wrapper via `mvn -N wrapper:wrapper`.
        run: mvn -B -ntp verify

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          # load: true loads the built image into the local Docker daemon
          # so the smoke-test step can run it. Without this, push:false
          # leaves the image in the BuildKit cache only, and `docker run`
          # tries to pull it from Docker Hub → permission denied.
          load: true
          tags: airwatch-sba:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image starts and exposes SBA UI
        run: |
          # Wave-1 SecurityConfig refuses to boot without
          # SBA_USER_PASSWORD_HASH (fail-closed by design). Provide a
          # CI-only BCrypt hash so the container can come up and we can
          # exercise the auth gate in the next step. Hash below is the
          # BCrypt of "ci-test" — not a real credential. '$' is doubled
          # in shell-quoting to keep docker-compose-style readers happy,
          # but here `docker run -e` takes the raw string.
          docker run -d --rm --name sba-smoke \
            -e SBA_USER_NAME=ci-test \
            -e 'SBA_USER_PASSWORD_HASH=$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy' \
            -p 18080:8080 airwatch-sba:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/admin/sba/actuator/health > /dev/null 2>&1; then
              echo "SBA is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "SBA did not come up within 30s"
          docker logs sba-smoke
          docker stop sba-smoke
          exit 1

      - name: Smoke-test auth gate
        run: |
          set -e
          # 401 expected without credentials
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18080/admin/sba/applications)
          if [ "$code" != "401" ]; then
            echo "::error::Expected 401 from /admin/sba/applications without auth; got $code"
            docker logs sba-smoke
            docker stop sba-smoke
            exit 1
          fi
          echo "✓ /admin/sba/applications returns 401 without credentials"
          docker stop sba-smoke
