name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify
        # No mvnw wrapper checked in — use the runner's pre-installed maven
        # (ubuntu-latest ships maven 3.x in the image). Switch to ./mvnw
        # once we commit the wrapper via `mvn -N wrapper:wrapper`.
        run: mvn -B -ntp verify

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # load: true loads the built image into the local Docker daemon
          # so the smoke-test step can run it. Without this, push:false
          # leaves the image in the BuildKit cache only, and `docker run`
          # tries to pull it from Docker Hub → permission denied.
          load: true
          tags: airwatch-sba:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image starts and exposes SBA UI
        run: |
          docker run -d --rm --name sba-smoke -p 18080:8080 airwatch-sba:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/admin/sba/actuator/health > /dev/null 2>&1; then
              echo "SBA is up after ${i}s"
              docker stop sba-smoke
              exit 0
            fi
            sleep 1
          done
          echo "SBA did not come up within 30s"
          docker logs sba-smoke
          docker stop sba-smoke
          exit 1
