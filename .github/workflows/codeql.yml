# CodeQL — GitHub's static analysis for security vulnerabilities.
# Free for public repos. Catches SQL injection, XSS, path traversal,
# hardcoded credentials, deserialization issues, etc. Findings show up
# on the Security tab and as inline PR comments.
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly re-scan so newly published CodeQL rules can flag old code.
    - cron: '30 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ "java-kotlin"]
    steps:
      - uses: actions/checkout@v6
      # CodeQL's Java autobuilder compiles the project with whatever JDK is
      # on PATH; the ubuntu-latest default (17) is older than this project's
      # JDK 21, so autobuild would fail. Pin the same Temurin 21 the ci.yml
      # build uses so the analysis build succeeds.
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
