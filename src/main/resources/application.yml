# Spring Boot Admin Server configuration.
spring:
  application:
    name: airwatch-sba
  # 30s cap on graceful shutdown phases — SBA can keep clients waiting on
  # SSE streams; this bounds the SIGTERM-to-SIGKILL window.
  lifecycle:
    timeout-per-shutdown-phase: 30s
  # Thymeleaf template cache enabled in all environments — SBA's bundled UI
  # ships pre-compiled and fingerprinted, so caching has zero downside and
  # avoids per-request template parsing.
  thymeleaf:
    cache: true
  # Tailor the SockJS path so it doesn't collide with our existing
  # /ws/* routes if SBA ever ends up reverse-proxied through the same
  # nginx listener.
  boot:
    admin:
      ui:
        title: AirWatch · JVM Admin
        brand: '<strong>AIRWATCH</strong> &nbsp;JVM Admin'
      # Defense-in-depth BASIC auth credentials. The password value MUST be a
      # BCrypt hash — generate with:
      #   htpasswd -bnBC 10 "" "MyPassword" | tr -d ':\n'
      # then export as SBA_USER_PASSWORD_HASH. App refuses to start if blank.
      user:
        name: ${SBA_USER_NAME:admin}
        password: ${SBA_USER_PASSWORD_HASH:}
      monitor:
        status-interval: 10s
        status-lifetime: 30s
      # Without an explicit allowlist any container in the compose
      # network could register a fake client. Keep this in sync with
      # actual api replica hostnames.
      discovery:
        enabled: false

server:
  port: 8080
  # SBA renders behind nginx at /admin/sba — set the context-path so
  # all SBA-emitted relative URLs include the prefix and the static
  # assets resolve correctly.
  servlet:
    context-path: /admin/sba
  # Graceful shutdown — let in-flight registrations and the SockJS
  # heartbeat-event flushes complete before the JVM exits on SIGTERM.
  # Otherwise rolling restarts cause every connected dashboard browser
  # to flash an "instance disconnected" toast for ~1s.
  shutdown: graceful
  # Honour X-Forwarded-* headers from nginx so SBA generates absolute
  # URLs against the externally-visible host (`localhost:13099`) instead
  # of the upstream Docker hostname (`sba:8080`). NATIVE delegates to
  # Tomcat's RemoteIpValve, which only trusts X-Forwarded-* from the
  # internal-proxies allowlist below (loopback + RFC1918 172.16/12).
  forward-headers-strategy: NATIVE
  tomcat:
    remoteip:
      internal-proxies: '127\.0\.0\.1|172\.(1[6-9]|2[0-9]|3[0-1])\.\d{1,3}\.\d{1,3}'
  # Error response hardening — never leak stack traces, exception types,
  # binding details, or framework messages to clients.
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        # SBA itself doesn't need most actuator endpoints exposed — only
        # health (so it can self-monitor). Keep the surface minimal.
        include: health,info
  endpoint:
    health:
      # Don't reveal component/DB/disk details to anonymous health probes.
      show-details: never

logging:
  level:
    de.codecentric.boot.admin: INFO
